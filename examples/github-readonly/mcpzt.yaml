project:
  name: github-readonly
  environment: development

runtime:
  mode: proxy
  default_decision: deny
  dry_run: false

auth:
  mode: none

servers:
  - name: github
    transport: http
    upstream: http://localhost:3001/mcp

capability_mappings:
  github:
    tools:
      github.search_issues:
        action: code.read
        risk: low
        access: read
        resource_type: issue
      github.get_pull_request:
        action: code.read
        risk: low
        access: read
        resource_type: pull_request
      github.merge_pull_request:
        action: code.merge
        risk: critical
        access: write
        resource_type: repository
        tags:
          - destructive

policies:
  - id: allow-github-read
    effect: allow
    match:
      server: github
      action: code.read

  - id: critical-actions-need-approval
    effect: require_approval
    match:
      server: github
      risk: critical

audit:
  destination: file
  path: ./mcpzt-audit.jsonl

