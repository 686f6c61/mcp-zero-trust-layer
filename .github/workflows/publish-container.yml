name: Publish Container Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Container version tag to publish, for example 0.1.3"
        required: true
        type: string
      ref:
        description: "Git ref to build"
        required: true
        default: "main"
        type: string
      latest:
        description: "Also update the latest tag"
        required: true
        default: true
        type: boolean

jobs:
  publish-container:
    name: Publish multi-arch container image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          minor="${version%.*}"
          image="ghcr.io/${GITHUB_REPOSITORY}"
          {
            echo "tags<<EOF"
            echo "${image}:${version}"
            echo "${image}:${minor}"
            if [ "${{ inputs.latest }}" = "true" ]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: true
          sbom: true

      - name: Inspect published image
        run: docker buildx imagetools inspect ghcr.io/${{ github.repository }}:${{ inputs.version }}
